
spring.main.lazy-initialization=true
spring.datasource.url=jdbc:h2:mem:swaggerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=SA
spring.datasource.password=
secondary.datasource.url=jdbc:h2:mem:reportingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
secondary.datasource.driver-class-name=org.h2.Driver
secondary.datasource.username=SA
secondary.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none

## Exclude external service auto-configurations
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.session.SessionAutoConfiguration

## H2 Console disabled – prevents eager dataSource creation during Tomcat startup
spring.h2.console.enabled=false

## Defer repository initialization (avoids query validation against H2)
spring.data.jpa.repositories.bootstrap-mode=deferred
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.query.validation_enabled=false
spring.jpa.properties.jakarta.persistence.validation.mode=none
spring.session.store-type=none
spring.cache.type=simple

## Redis connection (app creates LettuceConnectionFactory – keep defaults)

spring.redis.password=
spring.data.redis.host=localhost
spring.data.redis.port=6379

## ===========================
## CORS
## ===========================
cors.allowed-origins=http://localhost:*,http://127.0.0.1:*

## ===========================
## JWT Secret
## ===========================
jwt.secret=${JWT_SECRET_KEY:#{T(java.util.UUID).randomUUID().toString()}}

## ===========================
## Logging
## ===========================
logging.level.root=INFO
logging.file.name=logs/helpline104-api.log

## ===========================
## Common / SMS / Email URLs (safe defaults)
## ===========================
common-url=http://localhost:8080
sendSMSUrl=http://localhost:8080/sms/sendSMS
sendEmailGeneralUrl=http://localhost:8080/emailController/sendEmailGeneral
api.dev.url=${API_DEV_URL:https://amritwprdev.piramalswasthya.org}
api.uat.url=${API_UAT_URL:https://uatamrit.piramalswasthya.org}
api.demo.url=${API_DEMO_URL:https://amritdemo.piramalswasthya.org}
